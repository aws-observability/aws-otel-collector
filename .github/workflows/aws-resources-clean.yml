name: AWS Resources Cleaner

on:
  schedule:
    - cron: "0 0 * * *" # Run every day at midnight
  workflow_dispatch:
    inputs:
      daystokeep:
        description: "days to keep a resource"
        required: false
        default: "3"
env:
  DAYS_TO_KEEP: 3
  GO_VERSION: ~1.24.11

permissions:
  id-token: write
  contents: read

jobs:
  clean-resources:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        resource: [aps, autoscaling, ec2, ecs, efs, iam, launchconfig, loadbalancer, ebs, lambda]
        region: [us-east-1, us-east-2, us-west-1, us-west-2, ap-south-1, ap-northeast-2, ap-southeast-1, ap-southeast-2,
                 ap-northeast-1, ca-central-1, eu-central-1, eu-west-1, eu-west-2, eu-west-3, eu-north-1, sa-east-1]
        exclude:
          - resource: aps
            region: us-west-1
          - resource: aps
            region: ca-central-1

    steps:
      - uses: actions/checkout@v4
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tools/workflow/cleaner/go.sum

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.COLLECTOR_RESOURCE_CLEANER_ASSUMABLE_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Update days to keep
        if: github.event_name == 'workflow_dispatch'
        run: echo "DAYS_TO_KEEP=${{ github.event.inputs.daystokeep }}" >> $GITHUB_ENV

      - name: Clean old aws resources
        working-directory: tools/workflow/cleaner
        run: go run main.go -keep $DAYS_TO_KEEP -clean ${{ matrix.resource }}
        env:
          AWS_SDK_LOAD_CONFIG: true

  clean-eks-clusters:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        cluster:
          - collector-ci-amd64-1-33
          - collector-ci-amd64-1-34
          - collector-ci-arm64-1-33
          - collector-ci-arm64-1-34
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.COLLECTOR_RESOURCE_CLEANER_ASSUMABLE_ROLE_ARN }}
          aws-region: us-west-2

      - name: Clean orphaned namespaces and cluster resources
        shell: bash {0}
        run: |
          aws eks update-kubeconfig --name ${{ matrix.cluster }}
          kubectl get namespaces -o name | grep "aoc-ns-\|aoc-fargate-ns-" | \
            xargs -I{} kubectl delete {} --wait=false --ignore-not-found
          kubectl delete ingressclass nginx --ignore-not-found
          kubectl get clusterrole,clusterrolebinding -o name | grep nginx | \
            xargs -r kubectl delete --ignore-not-found

      - name: Cycle node group
        run: |
          NG=$(aws eks list-nodegroups --cluster-name ${{ matrix.cluster }} --query 'nodegroups[0]' --output text)
          echo "Cycling $NG on ${{ matrix.cluster }}"
          aws eks update-nodegroup-config --cluster-name ${{ matrix.cluster }} \
            --nodegroup-name $NG --scaling-config minSize=0,maxSize=5,desiredSize=0
          echo "Waiting for nodes to drain..."
          sleep 120
          aws eks update-nodegroup-config --cluster-name ${{ matrix.cluster }} \
            --nodegroup-name $NG --scaling-config minSize=2,maxSize=5,desiredSize=4

      - name: Clean orphaned security groups
        shell: bash {0}
        run: |
          aws ec2 describe-security-groups --filters "Name=group-name,Values=k8s-elb-*" \
            --query 'SecurityGroups[].GroupId' --output text | tr '\t' '\n' | \
            while read sg; do
              aws ec2 delete-security-group --group-id "$sg" 2>/dev/null || true
            done

  # API GW api has a limit of one delete request per 30 seconds. Thus it cannot be run in parallel
  # with the other tests
  clean-apigw:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        resource: [apigw]
        region: [us-east-1, us-east-2, us-west-1, us-west-2, ap-south-1, ap-northeast-2, ap-southeast-1, ap-southeast-2,
                  ap-northeast-1, ca-central-1, eu-central-1, eu-west-1, eu-west-2, eu-west-3, eu-north-1, sa-east-1]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tools/workflow/cleaner/go.sum

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.COLLECTOR_RESOURCE_CLEANER_ASSUMABLE_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Update days to keep
        if: github.event_name == 'workflow_dispatch'
        run: echo "DAYS_TO_KEEP=${{ github.event.inputs.daystokeep }}" >> $GITHUB_ENV

      - name: Clean old aws resources
        working-directory: tools/workflow/cleaner
        run: go run main.go -keep $DAYS_TO_KEEP -clean ${{ matrix.resource }}
        env:
          AWS_SDK_LOAD_CONFIG: true
